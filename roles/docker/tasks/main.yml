- name: Install Docker repository prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-debian
    state: present
    update_cache: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Read Debian package architecture
  ansible.builtin.command: dpkg --print-architecture
  register: docker_deb_arch
  changed_when: false
  check_mode: false

- name: Install Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/debian
      Suites: {{ ansible_facts.distribution_release }}
      Components: stable
      Architectures: {{ docker_deb_arch.stdout }}
      Signed-By: /etc/apt/keyrings/docker.asc

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: true
  when: not ansible_check_mode

- name: Configure Docker daemon hardening and log limits
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    content: |
      {
        "icc": false,
        "live-restore": true,
        "log-driver": "json-file",
        "log-opts": {
          "max-file": "3",
          "max-size": "10m"
        },
        "userland-proxy": false
      }
  notify: Restart docker

- name: Enable Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: not ansible_check_mode

- name: Report Docker group policy
  ansible.builtin.debug:
    msg: "Docker is intentionally sudo-only; no broad user is added to the docker group."
